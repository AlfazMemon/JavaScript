<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz Game</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="box">
    <h1 id="Question"></h1>

  <div id="option"></div>

  <button onclick="Next()" id="btn">Next</button>
  </div>
</body>


<script>


  const quizQuestions = [
    {
      question: "What does HTML stand for?",
      options: {
        a: "Hyper Text Markup Language",
        b: "High Text Machine Language",
        c: "Hyper Transfer Markup Language",
        d: "Home Tool Markup Language"
      },
      answer: "a"
    },
    {
      question: "What does CSS stand for?",
      options: {
        a: "Creative Style Sheets",
        b: "Computer Style Sheets",
        c: "Cascading Style Sheets",
        d: "Colorful Style Sheets"
      },
      answer: "c"
    },
    {
      question: "Which tag is used to create a hyperlink in HTML?",
      options: {
        a: "link",
        b: "a",
        c: "href",
        d: "url"
      },
      answer: "b"
    },
    {
      question: "Which CSS property changes the text color?",
      options: {
        a: "font-size",
        b: "background-color",
        c: "text-align",
        d: "color"
      },
      answer: "d"
    },
    {
      question: "Which keyword is used to declare a variable in JavaScript?",
      options: {
        a: "int",
        b: "var",
        c: "string",
        d: "define"
      },
      answer: "b"
    },
    {
      question: "Which company developed JavaScript?",
      options: {
        a: "Microsoft",
        b: "Google",
        c: "Netscape",
        d: "Apple"
      },
      answer: "c"
    },
    {
      question: "Which symbol is used for single-line comments in JavaScript?",
      options: {
        a: ` <span><</span><span>><span> `,
        b: "##",
        c: "//",
        d: "**"
      },
      answer: "c"
    },
    {
      question: "Which method prints output to the browser console?",
      options: {
        a: "alert()",
        b: "console.log()",
        c: "print()",
        d: "document.write()"
      },
      answer: "b"
    },
    {
      question: "Which HTML tag is used to display an image?",
      options: {
        a: "image",
        b: "picture",
        c: "src",
        d: "img"
      },
      answer: "d"
    },
    {
      question: "Which operator is used for strict equality in JavaScript?",
      options: {
        a: "=",
        b: "==",
        c: "===",
        d: "!="
      },
      answer: "c"
    }
  ];

  let currentquestion = 0;
  let score = 0;


  let option = document.getElementById('option');
  let Question = document.getElementById('Question');



  function showQuestion() {

    let q = quizQuestions[currentquestion];

    Question.innerHTML = q.question;
    option.innerHTML = `
    `
    let quizData = "";


    for (let key in q.options) {
      quizData += `
        <label for="" id="opt"><input type="radio" name="answer" value="${key}">
        ${key.toUpperCase()}. ${q.options[key]}</label>

        `


      option.innerHTML = quizData;
    }


  }



  function Next() {
    const selected = document.querySelector('input[name="answer"]:checked');
    let q = quizQuestions[currentquestion];

    if (!selected) {
      alert("Plese select any option");
      return;
    }

    if (selected.value === q.answer) {
      score++;

    }

    currentquestion++;

    if (currentquestion < quizQuestions.length) {
      showQuestion();
    }
    else {
      document.getElementById('btn').style.display = "none";
      Question.innerHTML = "Quiz Finished!";
      option.innerHTML = `<h2>Your Score: ${score}/${quizQuestions.length}</h2>`;
    }
  }




  showQuestion();

</script>

</html>
