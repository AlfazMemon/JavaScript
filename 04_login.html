<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>

    <style>
        *{
            
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        .login-form{
            width: 500px;
            margin: 4% auto;
            padding: 20px;
            box-shadow: 0px 4px 8px rgb(0,0,0.2);
            
        }
        input{
            
            width: 85%;
            height: 40px;
            margin: 20px 35px;
        }
        button{
            padding: 12px 28px;
            background-color: green;
            color: white;
            border: 0;
            border-radius: 5px;
            cursor: pointer;
        }
        #msg{
            margin-top: 14px;
        }
    </style>
</head>

<body>
    <div class="login-form">
        <h1>Login Form</h1>
        <input type="email" id="userEmail" placeholder="Enter Your Email">
        <input type="password" id="userPassword" placeholder="Enter Your Password">
        <button onclick="Login()">Login</button>
        <div id="msg"></div>
    </div>

    <script>
        function Login() {
            let userEmail = document.getElementById('userEmail').value;
            let userPassword = document.getElementById('userPassword').value;
            let msg;

            let correctEmail = "alfazmemon741@email.com";
            let correctPassword = "alfaz@123";

            if(userEmail == "" || userPassword == ""){
                msg = "All Field Required";
            }

            else if(userEmail !== correctEmail || userPassword !== correctPassword){
                msg = "Invalid Email OR Password";
            }

            else{   
                msg = "Login Successfully.!!";
            }

            document.getElementById('msg').innerText = msg;
        }

    </script>
</body>

</html>
