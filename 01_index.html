<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>

    <style>
        body{
            height: 100vh;
            display: flex;
            
        }
    
        .calc{
            text-align: center;
            width: 400px;
            height: 400px;
            border: 2px solid black;
            margin: auto;
        }
        button{
            margin-top: 10px;
            width: 25px;
            height: 25px;
            border: none;
            background-color: black;
            color: white;
        }
    </style>
</head>
<body>
    <div class="calc">

        
    <input type="number" id="num1" placeholder="Enter number">
    <input type="number" id="num2" placeholder="Enter number">
    <br>
    <button   onclick="addition()">+</button>
    <button onclick="subtraction()">-</button>
    <button onclick="multiplication()">*</button>
    <button onclick="division()">/</button>
    <button onclick="modul()">%</button>

    <h2 id="ans"></h2>
    </div>
    


    <script>
        function addition(){

            let num1 = document.getElementById('num1').value;
            let num2 = document.getElementById('num2').value;
            let ans = parseInt(num1) + parseInt(num2);
            document.getElementById('ans').innerHTML = "Answer is :"+ans;
        }

        function subtraction(){

            let num1 = document.getElementById('num1').value;
            let num2 = document.getElementById('num2').value;
            let ans = parseInt(num1) - parseInt(num2);
            document.getElementById('ans').innerHTML = "Answer is :"+ans;
        }

        function multiplication(){

            let num1 = document.getElementById('num1').value;
            let num2 = document.getElementById('num2').value;
            let ans = parseInt(num1) * parseInt(num2);
            document.getElementById('ans').innerHTML = "Answer is :"+ans;
        }

        function division(){

            let num1 = document.getElementById('num1').value;
            let num2 = document.getElementById('num2').value;
            let ans = parseInt(num1) / parseInt(num2);
            document.getElementById('ans').innerHTML = "Answer is :"+ans;
        }

        function modul(){

            let num1 = document.getElementById('num1').value;
            let num2 = document.getElementById('num2').value;
            let ans = parseInt(num1) % parseInt(num2);
            document.getElementById('ans').innerHTML = "Answer is :"+ans;
        }


    </script>
</body>
</html>
