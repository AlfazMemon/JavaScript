    <title>Product Managment</title>

    <style>
        *{
            margin: 0px;
            padding: 0px;
            box-sizing: border-box;
        }

        table{
            width: 70%;
            margin: 4% auto;
            align-items: center;
        }

        th{
            width: 90px;
        }

        td{
            padding: 10px;
        }
        tr,th,td,table,tbody {
            border: 1px solid black;
            border-collapse: collapse;

        }
        td img{
            width: 80px;
            height: 80px;
            object-fit: contain;
            filter: drop-shadow();
            
            
        }
        button{
            padding: 10px 24px;
            border-radius: 5px;
            background-color: green;
            cursor: pointer;
            margin: 10px 20px;
            color: white;
        }
        .btn2{
            background-color: red;
        }
        #id{
           
            width: 20px;
        }

        #btn{
            width: 120px;
        }

        #form{
            width: 800px;
            margin: 4% auto;
        }

        input{
            width: 100%;
            border-radius: 5px;
            margin: 10px 0px;
            padding: 10px;

        }


    </style>
</head>
