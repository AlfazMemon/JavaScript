<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notes App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>📝 Notes App</h1>

    <div class="top">

        <input
            type="text"
            id="title"
            placeholder="Note title"
        >

        <textarea
            id="description"
            placeholder="Write your note..."
        ></textarea>

        <button id="addBtn" onclick="NewNotes()">
            Add Note
        </button> 

    </div>

    <div class="search">

       <input
    type="text"
    id="search"
    placeholder="Search notes..."
    onkeyup="Search()">
        
    </div>

    <div id="notesContainer">
        
    </div>

</div>

<script src="script.js"></script>

</body>
</html>
